# @package _global_
# Base config for SafetyBiGym environments
# Extends bigym with human/safety configuration

env:
  env_name: safety_bigym
  episode_length: 3000
  cameras: ["head", "right_wrist", "left_wrist"]
  action_mode: absolute
  floating: true
  dataset_root: ""
  demo_down_sample_rate: 20
  render_mode: rgb_array
  enable_all_floating_dof: false

  # Safety-specific settings
  inject_human: true
  motion_clip_dir: ${oc.env:AMASS_DATA_DIR,null}
  motion_clip_paths:
    - "74/74_01_poses.npz"
    - "74/74_02_poses.npz"
    - "09/09_01_poses.npz"
    - "09/09_03_poses.npz"
    - "122/122_04_poses.npz"

  # Phase 1: Mock BodySLAM++ perception wrapper (see
  # safety_bigym.filters.body_slam_wrapper.BodySLAMWrapper).
  # mode=off  -> wrapper not attached (Phase 0 baseline).
  # mode=oracle -> wrapper attached, sigma=0, no occlusion/dropout/latency.
  # mode=noisy  -> full noise/latency/occlusion/dropout model.
  body_slam:
    mode: off
    sigma: 0.05
    alpha: 0.9
    latency_steps: 2
    use_occlusion: true
    occlusion_multiplier: 3.0
    dropout_prob: 0.02
    camera_name: head
    dt: 0.02

demos: !!float .inf

# @package _global_

defaults:
  - safety_bigym
  - _self_

env:
  task_name: drawer_top_close
  stddev_schedule: linear(1.0,0.1,500000)
  # 51 demos, max 200 control steps @ ds=10 (raw_max=2000); 3000 gives ~1.5x headroom.
  episode_length: 3000
  demo_down_sample_rate: 10
  enable_all_floating_dof: true

# Per-task override: use every available demo (DemoStore has 51 for this task).
demos: 51

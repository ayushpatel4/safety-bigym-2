# Root Hydra config for SafetyBiGym training
# Mirrors robobase's robobase_config.yaml but uses our cfgs path.

defaults:
  - _self_
  - env: null
  - method: null
  - intrinsic_reward_module: null
  - launch: null
  - override hydra/launcher: joblib

# Universal settings
create_train_env: true
num_train_envs: 1
replay_size_before_train: 2000
num_pretrain_steps: 0
num_train_frames: 1100000
eval_every_steps: 10000
num_eval_episodes: 10
update_every_steps: 2
num_explore_steps: 2000
save_snapshot: false
snapshot_every_n: 1000
batch_size: 256
is_imitation_learning: false

# Demonstration settings
demos: 0
demo_batch_size: null
use_self_imitation: false

# Observation settings
pixels: false
visual_observation_shape: [84, 84]
frame_stack: 1
frame_stack_on_channel: true
use_onehot_time_and_no_bootstrap: false

# Action settings
action_repeat: 1
action_sequence: 1
execution_length: 1
temporal_ensemble: true
temporal_ensemble_gain: 0.01
use_standardization: false
use_min_max_normalization: false
min_max_margin: 0.0
norm_obs: false

# Replay buffer settings
replay:
  prioritization: false
  size: 1000000
  gamma: 0.99
  demo_size: null
  save_dir: null
  nstep: 3
  num_workers: 4
  pin_memory: true
  alpha: 0.7
  beta: 0.5
  sequential: false
  transition_seq_len: 1

# Logging settings
wandb:
  use: false
  project: safety-critic
  entity: null
  name: "${env.env_name}-${now:%Y%m%d-%H%M%S}"
  tags: ["phase-0", "baseline"]

tb:
  use: false
  log_dir: /tmp/robobase_tb_logs
  name: null

# Misc
experiment_name: exp
seed: 1
num_gpus: 1
log_every: 1000
log_train_video: false
log_eval_video: true
log_pretrain_every: 100
save_csv: false

hydra:
  run:
    dir: ./exp_local/${now:%Y.%m.%d}/${now:%H%M%S}_${hydra.job.override_dirname}
  sweep:
    dir: ./exp_local/${now:%Y.%m.%d}/${now:%H%M}_${hydra.job.override_dirname}
    subdir: ${hydra.job.num}
